<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PocketCodex Host</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell viewer-shell">
      <section class="card host-card">
        <div class="host-layout">
          <div class="host-panel">
            <div class="viewer-hero">
              <button id="connect" class="hero-button">
                <span class="hero-button-content">
                  <span class="hero-button-icon" aria-hidden="true">
                    <svg viewBox="0 0 20 20" focusable="false">
                      <path
                        d="M4.5 3.5h11a1.5 1.5 0 0 1 1.5 1.5v7a1.5 1.5 0 0 1-1.5 1.5h-4.1v1.6h2a.75.75 0 1 1 0 1.5H6.6a.75.75 0 0 1 0-1.5h2v-1.6H4.5A1.5 1.5 0 0 1 3 12V5a1.5 1.5 0 0 1 1.5-1.5Zm0 1.5v7h11V5h-11Z"
                      />
                    </svg>
                  </span>
                  <span id="connectLabel">Stream Your Mac Controls to Your Phone</span>
                </span>
              </button>
            </div>

            <div class="host-copy">
              <span class="pill">Host Computer</span>
              <h1 class="host-title">Stream your Mac controls to your phone.</h1>
              <p class="status host-subtitle">
                Use this page on the computer. The host flow now shares the entire screen only and
                gives your phone a single link and QR code to connect.
              </p>
            </div>

            <div id="warning" class="status-card host-warning hidden"></div>
            <div class="status-card">
              <strong>Host Status</strong>
              <div id="status" class="status">Idle</div>
            </div>
            <div class="status-card">
              <strong>Phone Status</strong>
              <div id="phoneStatus" class="status">Waiting for phone connection.</div>
            </div>
            <div class="status-card">
              <strong>Phone Link</strong>
              <div id="link" class="status mono host-link">Waiting for connection.</div>
            </div>
            <div class="host-qr-wrap">
              <img id="viewerQr" alt="Viewer QR code" class="host-qr hidden" />
            </div>
          </div>

          <div class="video-frame host-preview-frame">
            <video id="preview" autoplay muted playsinline></video>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sessionInput = document.getElementById("session");
      const connectButton = document.getElementById("connect");
      const preview = document.getElementById("preview");
      const warningNode = document.getElementById("warning");
      const statusNode = document.getElementById("status");
      const phoneStatusNode = document.getElementById("phoneStatus");
      const linkNode = document.getElementById("link");
      const viewerQr = document.getElementById("viewerQr");
      const connectLabelNode = document.getElementById("connectLabel");

      const params = new URLSearchParams(window.location.search);
      sessionInput.value = params.get("session") || "demo123";
      const sessionToken = params.get("token") || "";

      let socket;
      let peer;
      let localStream;
      let heartbeatTimer;
      let runtimeConfig;
      let isConnecting = false;

      function setStatus(text) {
        statusNode.textContent = text;
      }

      function setPhoneStatus(text) {
        phoneStatusNode.textContent = text;
      }

      function updateConnectButton() {
        const connected = socket?.readyState === WebSocket.OPEN;
        connectLabelNode.textContent = connected
          ? "Host Ready"
          : isConnecting
            ? "Preparing Stream..."
            : "Stream Your Mac Controls to Your Phone";
        connectButton.classList.toggle("is-connected", connected);
        connectButton.disabled = isConnecting || connected;
      }

      function isSecureCaptureOrigin() {
        return window.location.protocol === "https:" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.hostname === "localhost";
      }

      function renderOriginWarning(config) {
        if (isSecureCaptureOrigin()) {
          warningNode.classList.add("hidden");
          warningNode.textContent = "";
          return;
        }

        const localUrl = new URL("/host.html", config.local_host_base_url);
        localUrl.search = window.location.search;
        warningNode.classList.remove("hidden");
        warningNode.textContent =
          `Safari screen sharing needs this host page on localhost or HTTPS. Open this on the Mac instead: ${localUrl.toString()}`;
      }

      async function ensureRuntimeConfig() {
        if (runtimeConfig) {
          return runtimeConfig;
        }
        const response = await fetch("/api/runtime-config");
        runtimeConfig = await response.json();
        renderOriginWarning(runtimeConfig);
        return runtimeConfig;
      }

      function wsBase(baseUrl) {
        return baseUrl.replace(/^http/, "ws");
      }

      async function createPeerConnection() {
        const config = await ensureRuntimeConfig();
        if (peer) {
          peer.close();
        }

        peer = new RTCPeerConnection({
          iceServers: config.ice_servers,
        });

        if (localStream) {
          for (const track of localStream.getTracks()) {
            peer.addTrack(track, localStream);
          }
        }

        peer.onicecandidate = (event) => {
          if (event.candidate && socket?.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "candidate", candidate: event.candidate }));
          }
        };

        return peer;
      }

      async function ensureSession() {
        if (sessionToken) {
          return;
        }
        throw new Error("Missing session token in host link.");
      }

      async function startSharing() {
        const config = await ensureRuntimeConfig();
        if (!isSecureCaptureOrigin()) {
          renderOriginWarning(config);
          setStatus("Open the host page on localhost or HTTPS before starting screen sharing.");
          return;
        }

        localStream = await navigator.mediaDevices.getDisplayMedia({
          video: {
            frameRate: 24,
            displaySurface: "monitor",
          },
          audio: false,
        });
        preview.srcObject = localStream;
        await createPeerConnection();
        setStatus("Sharing started. If Safari asked, choose your entire screen.");
        setPhoneStatus("Waiting for phone connection.");
      }

      async function connectSocket() {
        if (socket?.readyState === WebSocket.OPEN || isConnecting) {
          return;
        }

        isConnecting = true;
        updateConnectButton();
        const config = await ensureRuntimeConfig();
        await ensureSession();
        socket = new WebSocket(`${wsBase(window.location.origin)}/ws/session/${sessionInput.value}/host?token=${encodeURIComponent(sessionToken)}`);

        socket.onopen = () => {
          isConnecting = false;
          updateConnectButton();
          setStatus("Host connected. Starting full-screen sharing.");
          setPhoneStatus("Waiting for phone connection.");
          const url = new URL("/viewer.html", config.public_base_url);
          url.searchParams.set("session", sessionInput.value);
          url.searchParams.set("token", sessionToken);
          linkNode.textContent = url.toString();
          viewerQr.src = `/api/sessions/${sessionInput.value}/qr.svg?kind=viewer&token=${encodeURIComponent(sessionToken)}`;
          viewerQr.classList.remove("hidden");
          startSharing().catch((error) => {
            setStatus(`Unable to start sharing: ${error?.message || error}`);
          });
          clearInterval(heartbeatTimer);
          heartbeatTimer = setInterval(() => {
            fetch(`/api/sessions/${sessionInput.value}/heartbeat`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-Session-Token": sessionToken,
              },
              body: JSON.stringify({ role: "host" }),
            });
          }, 5000);
        };

        socket.onmessage = async (event) => {
          const message = JSON.parse(event.data);

          if (message.type === "viewer-ready") {
            if (!localStream) {
              setPhoneStatus("Phone connected, waiting for stream.");
              return;
            }

            await createPeerConnection();
            const offer = await peer.createOffer();
            await peer.setLocalDescription(offer);
            socket.send(JSON.stringify({ type: "offer", sdp: offer }));
            setStatus("Offer sent to viewer.");
            setPhoneStatus("Phone connected. Establishing stream.");
            return;
          }

          if (message.type === "answer" && peer) {
            await peer.setRemoteDescription(new RTCSessionDescription(message.sdp));
            setStatus("Viewer connected.");
            setPhoneStatus("Phone connected.");
            return;
          }

          if (message.type === "candidate" && peer && message.candidate) {
            await peer.addIceCandidate(new RTCIceCandidate(message.candidate));
          }
        };

        socket.onerror = () => {
          isConnecting = false;
          updateConnectButton();
        };

        socket.onclose = () => {
          isConnecting = false;
          updateConnectButton();
          setStatus("Socket disconnected.");
          setPhoneStatus("Phone disconnected.");
          clearInterval(heartbeatTimer);
        };
      }

      connectButton.addEventListener("click", connectSocket);
      updateConnectButton();
      setPhoneStatus("Waiting for phone connection.");
    </script>
  </body>
</html>
