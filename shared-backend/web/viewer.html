<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Pocket Mac Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell viewer-shell">
      <section class="card viewer-card">
        <input id="session" class="mono hidden" />

        <div class="viewer-hero">
          <button id="connect" class="hero-button">
            <span class="hero-button-content">
              <span class="hero-button-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" focusable="false">
                  <path
                    d="M4.5 3.5h11a1.5 1.5 0 0 1 1.5 1.5v7a1.5 1.5 0 0 1-1.5 1.5h-4.1v1.6h2a.75.75 0 1 1 0 1.5H6.6a.75.75 0 0 1 0-1.5h2v-1.6H4.5A1.5 1.5 0 0 1 3 12V5a1.5 1.5 0 0 1 1.5-1.5Zm0 1.5v7h11V5h-11Z"
                  />
                </svg>
              </span>
              <span id="connectLabel">Connect to Computer</span>
            </span>
          </button>
        </div>

        <div class="viewer-stage">
          <div class="video-frame">
            <video id="remote" autoplay playsinline></video>
          </div>
        </div>

        <div class="row viewer-action-row">
          <button id="focusCodex" class="secondary action-button">Focus Codex</button>
          <button id="fullscreenToggle" class="secondary icon-action-button" aria-label="Toggle fullscreen" title="Toggle fullscreen">
            <svg viewBox="0 0 20 20" focusable="false" aria-hidden="true">
              <path
                d="M3.75 7a.75.75 0 0 1-.75-.75V4.5A1.5 1.5 0 0 1 4.5 3h1.75a.75.75 0 0 1 0 1.5H4.5v1.75A.75.75 0 0 1 3.75 7Zm12.5 0a.75.75 0 0 1-.75-.75V4.5h-1.75a.75.75 0 0 1 0-1.5h1.75A1.5 1.5 0 0 1 17 4.5v1.75a.75.75 0 0 1-.75.75ZM4.5 17A1.5 1.5 0 0 1 3 15.5v-1.75a.75.75 0 0 1 1.5 0v1.75h1.75a.75.75 0 0 1 0 1.5H4.5Zm9.25 0a.75.75 0 0 1 0-1.5h1.75v-1.75a.75.75 0 0 1 1.5 0v1.75A1.5 1.5 0 0 1 15.5 17h-1.75Z"
              />
            </svg>
          </button>
        </div>
      </section>

      <section id="composerCard" class="card composer-card">
        <div class="row composer-toolbar">
          <div class="composer-logo" aria-hidden="true">
            <svg viewBox="0 0 20 20" focusable="false">
              <path
                d="M10 2.5c-4.4 0-8 2.9-8 6.5 0 2 1.1 3.7 2.8 4.9v3.6l3.6-2c.5.1 1 .1 1.6.1 4.4 0 8-2.9 8-6.5s-3.6-6.6-8-6.6Zm-3.8 6.6a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Zm3.8 0a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Zm3.8 0a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Z"
              />
            </svg>
          </div>
        </div>

        <div class="stack" style="margin-top: 16px">
          <input
            id="prompt"
            placeholder="Talk to Your Computer"
          />
          <div class="composer-actions">
            <button id="send" class="execute-button">Execute</button>
            <button id="stopComposer" class="secondary execute-button">Stop</button>
          </div>
          <details class="chat-history">
            <summary class="chat-history-toggle">
              <span class="history-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" focusable="false">
                  <path
                    d="M10 2.5c-4.4 0-8 2.9-8 6.5 0 2 1.1 3.7 2.8 4.9v3.6l3.6-2c.5.1 1 .1 1.6.1 4.4 0 8-2.9 8-6.5s-3.6-6.6-8-6.6Zm-3.8 6.6a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Zm3.8 0a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Zm3.8 0a1.2 1.2 0 1 1 0-2.4 1.2 1.2 0 0 1 0 2.4Z"
                  />
                </svg>
              </span>
              <span>Chat History</span>
            </summary>
            <div id="composerHistory" class="chat-history-list">No prompts yet.</div>
          </details>
        </div>
      </section>

      <section class="card composer-card">
        <button id="monitorToggle" class="secondary monitor-toggle">Connection Monitor</button>
        <div id="monitorPanel" class="status-grid hidden" style="margin-top: 16px">
          <div id="status" class="status-card compact-status">Idle</div>
          <div class="status-card">
            <strong>Viewer Mode</strong>
            <div id="controlBadge" class="status">View only</div>
          </div>
          <div id="presence" class="status-card compact-status">No session data yet.</div>
          <div class="status-card">
            <strong>Active Controller</strong>
            <div id="controllerStatus" class="status">No active controller.</div>
          </div>
          <div class="status-card">
            <strong>Recent Actions</strong>
            <div id="history" class="status">No command history yet.</div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sessionInput = document.getElementById("session");
      const connectButton = document.getElementById("connect");
      const connectLabelNode = document.getElementById("connectLabel");
      const focusCodexButton = document.getElementById("focusCodex");
      const fullscreenToggleButton = document.getElementById("fullscreenToggle");
      const stopComposerButton = document.getElementById("stopComposer");
      const monitorToggleButton = document.getElementById("monitorToggle");
      const sendButton = document.getElementById("send");
      const remoteVideo = document.getElementById("remote");
      const statusNode = document.getElementById("status");
      const presenceNode = document.getElementById("presence");
      const controlBadgeNode = document.getElementById("controlBadge");
      const controllerStatusNode = document.getElementById("controllerStatus");
      const historyNode = document.getElementById("history");
      const composerHistoryNode = document.getElementById("composerHistory");
      const chatHistoryDetails = document.querySelector(".chat-history");
      const promptField = document.getElementById("prompt");
      const composerCard = document.getElementById("composerCard");
      const monitorPanel = document.getElementById("monitorPanel");
      const viewerStage = document.querySelector(".viewer-stage");
      const videoFrame = document.querySelector(".video-frame");

      const params = new URLSearchParams(window.location.search);
      sessionInput.value = params.get("session") || "demo123";
      const sessionToken = params.get("token") || "";

      let socket;
      let peer;
      let heartbeatTimer;
      let pollTimer;
      let runtimeConfig;
      let controllerState;
      let isConnecting = false;

      function storageKey() {
        return `pocket-mac-viewer:${sessionInput.value}:${sessionToken}`;
      }

      function historyStorageKey() {
        return `${storageKey()}:prompt-history`;
      }

      function ensureViewerId() {
        const key = storageKey();
        let existing = localStorage.getItem(key);
        if (!existing) {
          existing = (window.crypto?.randomUUID?.() || `viewer-${Math.random().toString(36).slice(2)}`);
          localStorage.setItem(key, existing);
        }
        return existing;
      }

      const viewerId = ensureViewerId();
      const viewerLabel = "Phone";

      function readPromptHistory() {
        try {
          const raw = localStorage.getItem(historyStorageKey());
          if (!raw) {
            return [];
          }
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      }

      function writePromptHistory(items) {
        localStorage.setItem(historyStorageKey(), JSON.stringify(items.slice(0, 8)));
      }

      function renderPromptHistory() {
        const items = readPromptHistory();
        if (items.length === 0) {
          composerHistoryNode.textContent = "No prompts yet.";
          return;
        }

        composerHistoryNode.innerHTML = items
          .map(
            (item) =>
              `<button type="button" class="history-entry" data-prompt="${encodeURIComponent(item)}">${item}</button>`,
          )
          .join("");
      }

      function appendPromptHistory(text) {
        const next = [text, ...readPromptHistory().filter((item) => item !== text)];
        writePromptHistory(next);
        renderPromptHistory();
      }

      function setStatus(text) {
        statusNode.textContent = text;
      }

      function isSocketConnected() {
        return socket?.readyState === WebSocket.OPEN;
      }

      function updateConnectButton() {
        const connected = isSocketConnected();
        connectLabelNode.textContent = connected
          ? "Computer Connected"
          : isConnecting
            ? "Connecting to Computer..."
            : "Connect to Computer";
        connectButton.classList.toggle("is-connected", connected);
        connectButton.disabled = isConnecting || connected;
      }

      async function toggleFullscreen() {
        try {
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            await document.exitFullscreen();
            return;
          }
          if (videoFrame.requestFullscreen) {
            await videoFrame.requestFullscreen();
            return;
          }
          if (videoFrame.webkitRequestFullscreen) {
            videoFrame.webkitRequestFullscreen();
            return;
          }
          if (remoteVideo.webkitEnterFullscreen) {
            remoteVideo.webkitEnterFullscreen();
          }
        } catch (error) {
          console.debug("Fullscreen unavailable", error);
        }
      }

      function setLog(text) {
        console.debug(text);
      }

      function describeSeen(value) {
        return value ? value : "offline";
      }

      function updateControlUi() {
        const connected = isSocketConnected();
        const hasControl = Boolean(controllerState?.is_current_viewer);
        const controllerLabel = controllerState?.label || "No active controller";
        controlBadgeNode.textContent = hasControl ? "You control this session" : "View only";
        controllerStatusNode.textContent = controllerState?.active
          ? `${controllerLabel} is controlling this session. Lease: ${controllerState.lease_seconds}s`
          : "No active controller.";
        focusCodexButton.disabled = !connected || !hasControl;
        fullscreenToggleButton.disabled = !connected;
        sendButton.disabled = !connected || !hasControl;
        stopComposerButton.disabled = !connected || !hasControl;
        promptField.disabled = !connected;
        chatHistoryDetails.open = connected ? chatHistoryDetails.open : false;
        chatHistoryDetails.classList.toggle("is-disabled", !connected);
        composerCard.classList.toggle("is-disabled", !connected);
      }

      async function acquireControlIfAvailable() {
        if (controllerState?.is_current_viewer) {
          return true;
        }

        const response = await fetch(`/api/sessions/${sessionInput.value}/control/acquire`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Session-Token": sessionToken,
          },
          body: JSON.stringify({ viewer_id: viewerId, label: viewerLabel }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          if (data.controller) {
            controllerState = data.controller;
            updateControlUi();
          }
          return false;
        }

        controllerState = data.controller;
        updateControlUi();
        return Boolean(controllerState?.is_current_viewer);
      }

      async function ensureRuntimeConfig() {
        if (runtimeConfig) {
          return runtimeConfig;
        }
        const response = await fetch("/api/runtime-config");
        runtimeConfig = await response.json();
        return runtimeConfig;
      }

      async function refreshSessionState() {
        const url = `/api/sessions/${sessionInput.value}?viewer_id=${encodeURIComponent(viewerId)}`;
        const response = await fetch(url, {
          headers: { "X-Session-Token": sessionToken },
        });
        if (!response.ok) {
          presenceNode.textContent = "Session not found yet.";
          controllerStatusNode.textContent = "Session unavailable.";
          return;
        }

        const data = await response.json();
        const session = data.session;
        controllerState = data.controller;
        updateControlUi();
        presenceNode.textContent =
          `Host: ${describeSeen(session.last_host_seen)} | ` +
          `Viewer: ${describeSeen(session.last_viewer_seen)} | ` +
          `Agent: ${describeSeen(session.last_agent_seen)}`;

        if (data.recent_commands.length === 0) {
          historyNode.textContent = "No command history yet.";
          return;
        }

        const lines = data.recent_commands.slice(0, 5).map((command) => {
          const suffix = command.result?.detail ? ` -> ${command.result.detail}` : "";
          return `#${command.id} ${command.status}${suffix}`;
        });
        historyNode.textContent = lines.join("\n");
      }

      function wsBase(baseUrl) {
        return baseUrl.replace(/^http/, "ws");
      }

      async function ensureSession() {
        if (sessionToken) {
          return;
        }
        throw new Error("Missing session token in viewer link.");
      }

      async function connectSocket() {
        if (socket?.readyState === WebSocket.OPEN || isConnecting) {
          return;
        }

        isConnecting = true;
        updateConnectButton();
        const config = await ensureRuntimeConfig();
        await ensureSession();
        peer = new RTCPeerConnection({
          iceServers: config.ice_servers,
        });

        peer.ontrack = (event) => {
          remoteVideo.srcObject = event.streams[0];
        };

        peer.onicecandidate = (event) => {
          if (event.candidate && socket?.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ type: "candidate", candidate: event.candidate }));
          }
        };

        socket = new WebSocket(`${wsBase(window.location.origin)}/ws/session/${sessionInput.value}/viewer?token=${encodeURIComponent(sessionToken)}`);
        socket.onopen = () => {
          isConnecting = false;
          updateConnectButton();
          setStatus("Viewer connected. Waiting for host stream.");
          socket.send(JSON.stringify({ type: "viewer-ready" }));
          clearInterval(heartbeatTimer);
          clearInterval(pollTimer);
          heartbeatTimer = setInterval(() => {
            fetch(`/api/sessions/${sessionInput.value}/heartbeat`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-Session-Token": sessionToken,
                "X-Viewer-Id": viewerId,
              },
              body: JSON.stringify({ role: "viewer" }),
            });
          }, 5000);
          pollTimer = setInterval(refreshSessionState, 2000);
          refreshSessionState();
          acquireControlIfAvailable();
        };

        socket.onmessage = async (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "offer") {
            await peer.setRemoteDescription(new RTCSessionDescription(message.sdp));
            const answer = await peer.createAnswer();
            await peer.setLocalDescription(answer);
            socket.send(JSON.stringify({ type: "answer", sdp: answer }));
            setStatus("Receiving stream.");
            return;
          }

          if (message.type === "candidate" && message.candidate) {
            await peer.addIceCandidate(new RTCIceCandidate(message.candidate));
          }
        };

        socket.onerror = () => {
          isConnecting = false;
          updateConnectButton();
        };

        socket.onclose = () => {
          isConnecting = false;
          updateConnectButton();
          setStatus("Socket disconnected.");
          clearInterval(heartbeatTimer);
          clearInterval(pollTimer);
        };
      }

      async function sendCommand(kind, options = {}) {
        const hasControl = await acquireControlIfAvailable();
        if (!hasControl) {
          setLog("Another viewer is controlling this session right now.");
          refreshSessionState();
          return null;
        }

        const response = await fetch(`/api/sessions/${sessionInput.value}/commands`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Session-Token": sessionToken,
            "X-Viewer-Id": viewerId,
          },
          body: JSON.stringify({
            kind,
            text: options.text || "",
            submit: options.submit ?? true,
          }),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          setLog(data.detail || `Failed to send ${kind}.`);
          refreshSessionState();
          return null;
        }

        if (kind === "prompt_to_codex") {
          setLog(`Queued command #${data.id}\nStatus: ${data.status}\nSubmit: ${data.payload.submit}`);
        } else {
          setLog(`Queued ${kind} as command #${data.id}.`);
        }
        refreshSessionState();
        return data;
      }

      async function focusThenStopCodex() {
        const hasControl = await acquireControlIfAvailable();
        if (!hasControl) {
          setLog("Another viewer is controlling this session right now.");
          refreshSessionState();
          return;
        }

        await sendCommand("focus_codex");
        await sendCommand("interrupt_codex");
      }

      async function sendPrompt(submit) {
        const text = promptField.value.trim();
        if (!text) {
          setLog("Enter a prompt first.");
          return;
        }
        const data = await sendCommand("prompt_to_codex", { text, submit });
        if (!data) {
          return;
        }

        appendPromptHistory(text);
        if (submit) {
          promptField.value = "";
          viewerStage.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }

      function toggleMonitor() {
        const hidden = monitorPanel.classList.toggle("hidden");
        monitorToggleButton.textContent = hidden ? "Connection Monitor" : "Hide Connection Monitor";
      }

      connectButton.addEventListener("click", connectSocket);
      sendButton.addEventListener("click", () => sendPrompt(true));
      focusCodexButton.addEventListener("click", () => sendCommand("focus_codex"));
      fullscreenToggleButton.addEventListener("click", toggleFullscreen);
      stopComposerButton.addEventListener("click", focusThenStopCodex);
      monitorToggleButton.addEventListener("click", toggleMonitor);
      composerHistoryNode.addEventListener("click", (event) => {
        const entry = event.target.closest(".history-entry");
        if (!entry) {
          return;
        }
        promptField.value = decodeURIComponent(entry.dataset.prompt || "");
        promptField.focus();
      });

      updateControlUi();
      updateConnectButton();
      renderPromptHistory();
    </script>
  </body>
</html>
